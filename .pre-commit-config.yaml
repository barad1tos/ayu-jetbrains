repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # Only v9.9.1 is intentionally malformed JSON (exercises the manifest
        # parser's syntax-error branch). All other whatsnew test fixtures are
        # valid JSON and must still pass validation so a maintainer typo in
        # e.g. v9.9.5 gets caught by the hook.
        exclude: '^src/test/resources/whatsnew/v9\.9\.1/'
      - id: check-xml
      - id: check-added-large-files
        args: ['--maxkb=500']
        # assets/ holds marketplace screenshots; slide-*.png under whatsnew/v*/
        # are release-showcase screenshots intentionally shipped at full quality.
        # Only the slide PNGs are excluded — any OTHER oversized file dropped
        # into whatsnew/ (a video, zip, database dump) still gets flagged.
        exclude: '^(assets/|src/main/resources/whatsnew/v[0-9.]+/slide-[A-Za-z0-9-]+\.png$)'
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']
        # Fire on both pre-commit AND commit-msg stages so cherry-picks,
        # reverts, and amends on main are caught — not just plain `git commit`.
        # pre-commit stage alone misses cherry-pick because cherry-pick
        # skips pre-commit hooks by default but still invokes commit-msg.
        stages: [pre-commit, commit-msg]
      - id: detect-private-key

  # GitHub Actions security scanner
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        args: ['--min-severity', 'medium']

  # Local hooks
  - repo: local
    hooks:
      - id: guard-linter-configs
        name: guard linter configs
        entry: ./scripts/guard-linter-configs.sh
        language: system
        files: ^(detekt\.yml|\.editorconfig|codecov\.yml)$
        pass_filenames: true

      - id: ktlint-check
        name: ktlint
        entry: ./gradlew ktlintCheck
        language: system
        pass_filenames: false
        types: [kotlin]

      - id: detekt
        name: detekt
        entry: ./gradlew detekt
        language: system
        pass_filenames: false
        types: [kotlin]

      - id: verify-docs
        name: verify docs sync (features.yml ↔ README + plugin.xml + CHANGELOG)
        entry: scripts/verify-docs.py
        language: system
        pass_filenames: false
        # Run on any edit to one of the inputs/outputs of the sync check.
        files: ^(docs/features\.yml|README\.md|CHANGELOG\.md|src/main/resources/META-INF/plugin\.xml|src/main/kotlin/.*\.kt|assets/feature-.*\.png)$

      # Manual-stage helper: `pre-commit run verify-docs-restamp` rewrites
      # every orphaned last_verified_sha in features.yml to current HEAD.
      # NOT auto-invoked — amending stamp metadata mid-commit would change
      # the diff the user just staged. Explicit invocation only; the main
      # `verify-docs` hook above surfaces the exact command in its error
      # message when an orphan stamp is detected on a feature branch that
      # touches tracked sources.
      - id: verify-docs-restamp
        name: re-stamp orphaned last_verified_sha to HEAD (manual)
        entry: scripts/verify-docs.py --restamp
        language: system
        pass_filenames: false
        stages: [manual]
