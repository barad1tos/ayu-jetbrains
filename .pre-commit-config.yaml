repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        # Test fixtures under whatsnew/ are intentionally malformed to exercise
        # the manifest parser's error branches (v9.9.1 is invalid JSON on
        # purpose). Matches the same exclude in .github/workflows/build.yml.
        exclude: '^src/test/resources/whatsnew/'
      - id: check-xml
      - id: check-added-large-files
        args: ['--maxkb=500']
        # assets/ holds marketplace screenshots; src/main/resources/whatsnew/
        # holds release-showcase slide PNGs. Both are user-facing artifacts
        # intentionally shipped at full quality.
        exclude: '^(assets/|src/main/resources/whatsnew/)'
      - id: check-merge-conflict
      - id: no-commit-to-branch
        args: ['--branch', 'main']
      - id: detect-private-key

  # GitHub Actions security scanner
  - repo: https://github.com/woodruffw/zizmor-pre-commit
    rev: v1.22.0
    hooks:
      - id: zizmor
        args: ['--min-severity', 'medium']

  # Local hooks
  - repo: local
    hooks:
      - id: guard-linter-configs
        name: guard linter configs
        entry: ./scripts/guard-linter-configs.sh
        language: system
        files: ^(detekt\.yml|\.editorconfig|codecov\.yml)$
        pass_filenames: true

      - id: ktlint-check
        name: ktlint
        entry: ./gradlew ktlintCheck
        language: system
        pass_filenames: false
        types: [kotlin]

      - id: detekt
        name: detekt
        entry: ./gradlew detekt
        language: system
        pass_filenames: false
        types: [kotlin]
