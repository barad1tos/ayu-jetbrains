name: CI

on:
  push:
    branches: [main]
    paths-ignore: &skip-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.sourcery.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *skip-paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Fast checks (no Gradle, seconds) ──────────
  lint-files:
    name: Lint files
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # verify-docs.py uses `git rev-parse <last_verified_sha>` to
          # anchor screenshot freshness checks; shallow clone (default
          # fetch-depth=1) would fail for SHAs older than the PR tip.
          fetch-depth: 0
          persist-credentials: false
      - name: Check trailing whitespace
        run: |
          ! git grep -rIl '[[:blank:]]$' -- \
            ':!*.jar' ':!*.zip' ':!*.png' ':!*.svg' \
            || { echo "::error::Trailing whitespace found"; exit 1; }
      - name: Validate YAML
        run: |
          find . -name '*.yml' -o -name '*.yaml' | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" \
              || { echo "::error::Invalid YAML: $f"; exit 1; }
          done
      - name: Validate JSON
        run: |
          # v9.9.1 test fixture is intentionally malformed JSON (exercises the
          # manifest parser's syntax-error branch). Only that one directory is
          # excluded — other whatsnew test fixtures are valid JSON and must
          # still be checked so a maintainer typo in e.g. v9.9.5 gets caught.
          find . -name '*.json' -not -path '*/build/*' \
            -not -path '*/src/test/resources/whatsnew/v9.9.1/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "::error::Invalid JSON: $f"; exit 1; }
          done
      - name: Validate XML
        run: |
          find . -name '*.xml' -not -path '*/build/*' | while read f; do
            python3 -c "
          import xml.etree.ElementTree as ET
          ET.parse('$f')
          " || { echo "::error::Invalid XML: $f"; exit 1; }
          done
      - name: Guard tests against production source reads
        run: scripts/guard-test-source-reads.py
      - name: Check for large files (>500KB)
        run: |
          # Only release-showcase slide PNGs are exempted (shipped at full
          # quality for a reason) — any OTHER oversized file dropped into
          # resources/whatsnew/ still gets flagged.
          found=0
          while IFS= read -r f; do
            case "$f" in
              */src/main/resources/whatsnew/v*/slide-*.png) continue ;;
            esac
            echo "::error::Large file detected: $f ($(du -h "$f" | cut -f1))"
            found=1
          done < <(find . -not -path '*/build/*' -not -path '*/.gradle/*' \
            -not -path '*/.git/*' -not -path '*/assets/*' \
            -type f -size +500k \
            -not -name '*.jar' -not -name '*.zip')
          if [ "$found" -eq 1 ]; then exit 1; fi
      - name: Check for merge conflict markers
        run: |
          ! git grep -rIl '<<<<<<<\|>>>>>>>' -- \
            ':!*.md' ':!.github/workflows/*' \
            || { echo "::error::Merge conflict markers found"; exit 1; }
      - name: Detect private keys
        run: |
          pattern="BEGIN.*(RSA |DSA |EC |OPENSSH )?PRIVATE KEY"
          ! git grep -rIlE "$pattern" \
            -- ':!*.md' ':!.pre-commit-config.yaml' \
            ':!.github/workflows/*' \
            || { echo "::error::Private key detected"; exit 1; }
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: scripts/uv.lock
      - name: Test campaign generator
        run: uv run --project scripts python scripts/tests/test-generate-campaign.py
      - name: Test Plugin Verifier API gate
        run: python3 scripts/tests/test-verify-plugin-verifier.py
      - name: Verify docs sync (features.yml ↔ README + plugin.xml + CHANGELOG)
        run: scripts/verify-docs.py

  gha-security:
    name: GHA security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Scan workflows for vulnerabilities
        run: uvx zizmor --min-severity medium .

  theme-consistency:
    name: Theme consistency
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: scripts/uv.lock
      - name: Verify XML cross-variant consistency
        run: scripts/verify-theme-xml.py
      - name: Verify JSON pair consistency
        run: python3 scripts/verify-theme-json.py

  ktlint-autofix:
    name: Ktlint autofix
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Apply ktlint formatting
        run: ./gradlew ktlintFormat
      - name: Commit formatting changes
        env:
          AUTOFIX_TOKEN: ${{ secrets.AYU_AUTOFIX_TOKEN }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          git add -- '*.kt' '*.kts'
          if git diff --cached --quiet; then
            echo "ktlintFormat made no changes"
            exit 0
          fi

          if [ -z "${AUTOFIX_TOKEN}" ]; then
            echo "::error::AYU_AUTOFIX_TOKEN is required to push ktlint auto-fix commits and trigger fresh PR checks"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "style: apply ktlint formatting"
          git -c http.extraheader="AUTHORIZATION: bearer ${AUTOFIX_TOKEN}" \
            push origin "HEAD:${HEAD_REF}"

  # ── Tier 2: Gradle compilation ─────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Compile and build plugin
        run: ./gradlew buildPlugin

  # ── Tier 3: Parallel analysis (after build, PRs only) ──
  analyze:
    name: Analyze
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Ktlint + Detekt + Kotlin warnings
        run: >
          ./gradlew ktlintCheck detekt compileKotlin
          -Pkotlin.compiler.option.allWarningsAsErrors=true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    environment: ci
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Run tests with coverage
        run: ./gradlew test integrationTest koverXmlReport koverVerify
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: true
          use_cli: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  jar-integrity:
    name: JAR integrity
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Build plugin JAR
        run: ./gradlew buildPlugin
      - name: Verify bytecode freshness
        run: python3 scripts/verify-bytecode.py
      - name: Verify ProGuard keep rules
        run: python3 scripts/verify-proguard-keeps.py

  # ── Tier 4: Full IDE verification (PRs only) ──────────
  verify:
    name: Verify (${{ matrix.group }})
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Split into 4 groups of 3+3+5+1 IDEs each so per-runner disk + I/O budget
        # stays below the ClosedByInterruptException threshold that the unsplit
        # 6-IDE Group A kept hitting.
        group: [A1, A2, B, C]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: ./.github/actions/free-disk-space
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Verify plugin (group ${{ matrix.group }})
        run: ./gradlew verifyPlugin -DverifyGroup=${{ matrix.group }}
      - name: Fail on internal API verifier findings
        run: python3 scripts/verify-plugin-verifier.py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.group == 'A1'
        with:
          name: ayu-islands-plugin
          path: build/distributions/*.zip

  # ── Gate: all checks must pass ─────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs:
      - lint-files
      - gha-security
      - theme-consistency
      - ktlint-autofix
      - build
      - analyze
      - test
      - jar-integrity
      - verify
    if: always()
    steps:
      - name: Check results
        run: |
          results=(
            "lint-files=${{ needs.lint-files.result }}"
            "gha-security=${{ needs.gha-security.result }}"
            "theme-consistency=${{ needs.theme-consistency.result }}"
            "ktlint-autofix=${{ needs.ktlint-autofix.result }}"
            "build=${{ needs.build.result }}"
            "analyze=${{ needs.analyze.result }}"
            "test=${{ needs.test.result }}"
            "jar-integrity=${{ needs.jar-integrity.result }}"
            "verify=${{ needs.verify.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%=*}"
            status="${r##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "✓ $name ($status)"
            else
              echo "::error::$name: $status"
              failed=1
            fi
          done
          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi
          echo "All checks passed"
