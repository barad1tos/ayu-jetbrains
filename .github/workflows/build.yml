name: CI

on:
  push:
    branches: [main]
    paths-ignore: &skip-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.sourcery.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *skip-paths
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Fast checks (no Gradle, seconds) ──────────
  lint-files:
    name: Lint files
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Check trailing whitespace
        run: |
          ! git grep -rIl '[[:blank:]]$' -- \
            ':!*.jar' ':!*.zip' ':!*.png' ':!*.svg' \
            || { echo "::error::Trailing whitespace found"; exit 1; }
      - name: Validate YAML
        run: |
          find . -name '*.yml' -o -name '*.yaml' | while read f; do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" \
              || { echo "::error::Invalid YAML: $f"; exit 1; }
          done
      - name: Validate JSON
        run: |
          find . -name '*.json' -not -path '*/build/*' | while read f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "::error::Invalid JSON: $f"; exit 1; }
          done
      - name: Validate XML
        run: |
          find . -name '*.xml' -not -path '*/build/*' | while read f; do
            python3 -c "
          import xml.etree.ElementTree as ET
          ET.parse('$f')
          " || { echo "::error::Invalid XML: $f"; exit 1; }
          done
      - name: Check for large files (>500KB)
        run: |
          found=0
          while IFS= read -r f; do
            echo "::error::Large file detected: $f ($(du -h "$f" | cut -f1))"
            found=1
          done < <(find . -not -path '*/build/*' -not -path '*/.gradle/*' \
            -not -path '*/.git/*' -type f -size +500k \
            -not -name '*.jar' -not -name '*.zip')
          if [ "$found" -eq 1 ]; then exit 1; fi
      - name: Check for merge conflict markers
        run: |
          ! git grep -rIl '<<<<<<<\|>>>>>>>' -- \
            ':!*.md' ':!.github/workflows/*' \
            || { echo "::error::Merge conflict markers found"; exit 1; }
      - name: Detect private keys
        run: |
          pattern="BEGIN.*(RSA |DSA |EC |OPENSSH )?PRIVATE KEY"
          ! git grep -rIlE "$pattern" \
            -- ':!*.md' ':!.pre-commit-config.yaml' \
            ':!.github/workflows/*' \
            || { echo "::error::Private key detected"; exit 1; }

  gha-security:
    name: GHA security (zizmor)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      - name: Scan workflows for vulnerabilities
        run: uvx zizmor --min-severity medium .

  theme-consistency:
    name: Theme consistency
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Check XML cross-variant consistency
        run: python3 scripts/check-consistency.py
      - name: Check JSON pair consistency
        run: python3 scripts/check-json-consistency.py

  # ── Tier 2: Gradle compilation ─────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Compile and build plugin
        run: ./gradlew buildPlugin

  # ── Tier 3: Parallel analysis (after build, PRs only) ──
  analyze:
    name: Analyze
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Ktlint + Detekt + Kotlin warnings
        run: >
          ./gradlew ktlintCheck detekt compileKotlin
          -Pkotlin.compiler.option.allWarningsAsErrors=true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    environment: ci
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Run unit tests with coverage
        run: ./gradlew test koverXmlReport koverVerify
      - name: Upload coverage to Codecov
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5
        with:
          files: build/reports/kover/report.xml
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── Tier 4: Full IDE verification (PRs only) ──────────
  verify:
    name: Verify (${{ matrix.group }})
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        group: [A, B]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
      - name: Verify plugin (group ${{ matrix.group }})
        run: ./gradlew verifyPlugin -DverifyGroup=${{ matrix.group }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: matrix.group == 'A'
        with:
          name: ayu-islands-plugin
          path: build/distributions/*.zip

  # ── Gate: all checks must pass ─────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    needs:
      - lint-files
      - gha-security
      - theme-consistency
      - build
      - analyze
      - test
      - verify
    if: always()
    steps:
      - name: Check results
        run: |
          results=(
            "lint-files=${{ needs.lint-files.result }}"
            "gha-security=${{ needs.gha-security.result }}"
            "theme-consistency=${{ needs.theme-consistency.result }}"
            "build=${{ needs.build.result }}"
            "analyze=${{ needs.analyze.result }}"
            "test=${{ needs.test.result }}"
            "verify=${{ needs.verify.result }}"
          )
          failed=0
          for r in "${results[@]}"; do
            name="${r%%=*}"
            status="${r##*=}"
            if [[ "$status" == "success" || "$status" == "skipped" ]]; then
              echo "✓ $name ($status)"
            else
              echo "::error::$name: $status"
              failed=1
            fi
          done
          if [[ "$failed" -eq 1 ]]; then
            exit 1
          fi
          echo "All checks passed"
