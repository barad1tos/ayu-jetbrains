name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore: &skip-paths
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.sourcery.yaml'
  pull_request:
    branches: [main]
    paths-ignore: *skip-paths
  schedule:
    - cron: '37 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - if: matrix.language == 'java-kotlin'
        uses: ./.github/actions/free-disk-space

      - if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          distribution: temurin
          java-version: 21

      - if: matrix.language == 'java-kotlin'
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - if: matrix.language == 'java-kotlin'
        name: Compile Kotlin for CodeQL tracing
        run: |
          set +e
          OUTPUT=$(./gradlew compileKotlin compileTestKotlin --no-daemon 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -eq 0 ]; then
            echo "$OUTPUT"
            exit 0
          fi

          # CodeQL rejects Kotlin versions above its ceiling — detect and auto-downgrade
          if echo "$OUTPUT" | grep -q "too recent"; then
            # CodeQL reports "below X.Y.Z" — decrement minor by 10 to get a real Kotlin release
            CEILING=$(echo "$OUTPUT" | grep -m1 -oE "below [0-9]+\.[0-9]+\.[0-9]+" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
            MAX_VER=$(echo "$CEILING" | awk -F. '{p=$3-10; if(p<0)p=0; printf "%s.%s.%d",$1,$2,p}')
            if [ -n "$MAX_VER" ]; then
              echo "::warning::Kotlin too new for CodeQL — temporarily downgrading to $MAX_VER"
              sed -i "s/kotlin(\"jvm\") version \"[^\"]*\"/kotlin(\"jvm\") version \"$MAX_VER\"/" build.gradle.kts
              ./gradlew compileKotlin compileTestKotlin --no-daemon
              RETRY_EXIT=$?
              git restore build.gradle.kts
              exit $RETRY_EXIT
            else
              echo "::warning::Kotlin too new for CodeQL but could not parse max supported version — review the error above"
            fi
          fi

          # Different failure — surface original output and fail
          echo "$OUTPUT"
          exit $EXIT_CODE

      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:${{ matrix.language }}
