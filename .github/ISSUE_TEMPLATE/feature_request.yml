name: Feature Request
description: Suggest a new feature, language highlight, or UI improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Ayu Islands? We'd love to hear it.

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New language highlight
        - Color / palette tweak
        - Accent customization
        - Glow effects
        - UI element styling
        - Settings panel
        - IDE compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: How would this improve your workflow?
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Reference screenshots
      description: Attach mockups, screenshots from other themes, or examples.
    validations:
      required: false
