version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      # Actions pin to commit-SHA / tag references, not semver — Dependabot
      # rejects `semver-major-days` under this ecosystem. Default-days still
      # applies uniformly to every action update.
      default-days: 3
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    ignore:
      # 2.18.1 breaks the verifyPlugin compatibility matrix; allow later fixes.
      - dependency-name: "org.jetbrains.intellij.platform"
        versions:
          - "2.18.1"
    labels:
      - "dependencies"
      - "gradle"
    commit-message:
      prefix: "chore"
      include: "scope"
