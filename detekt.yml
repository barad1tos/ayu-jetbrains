style:
  ForbiddenMethodCall:
    active: true
    includes:
      - "**/test/kotlin/**"
    methods:
      - value: "java.nio.file.Files.readString"
        reason: "Tests assert on observable behavior, not source-file text"
      - value: "com.intellij.openapi.util.io.FileUtil.loadFile"
        reason: "Tests assert on observable behavior, not source-file text"
  ReturnCount:
    max: 10
  LoopWithTooManyJumpStatements:
    maxJumpCount: 3

complexity:
  LongParameterList:
    constructorThreshold: 9
  LargeClass:
    excludes:
      - "**/test/**"
  LongMethod:
    threshold: 200
  TooManyFunctions:
    thresholdInClasses: 25
    thresholdInObjects: 20
  CyclomaticComplexMethod:
    threshold: 15
  NestedBlockDepth:
    threshold: 5

exceptions:
  TooGenericExceptionCaught:
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - Exception
      - IllegalMonitorStateException
      - IndexOutOfBoundsException
      - NullPointerException
      - Throwable
