# ─── Required external/community links ────────────────────────────────────
# The README must expose these community touchpoints. Each entry is a
# substring that must appear somewhere in the declared file; case-insensitive.
# Catches "someone rewrote the Community section and dropped Discussions links".
required_links:
  - name: "GitHub Discussions — Feature Requests"
    substring: "discussions/categories/feature-requests"
    in: README.md
  - name: "GitHub Discussions — Show Your Setup"
    substring: "discussions/categories/show-your-setup"
    in: README.md
  - name: "GitHub Discussions — Q&A"
    substring: "discussions/categories/q-a"
    in: README.md
  - name: "JetBrains Marketplace plugin page"
    substring: "plugins.jetbrains.com/plugin/30373"
    in: README.md
  - name: "Original Ayu palette source"
    substring: "github.com/ayu-theme/ayu-colors"
    in: README.md
  - name: "Bug report template"
    substring: "issues/new?template=bug_report"
    in: README.md

# ─── Asset inventory ──────────────────────────────────────────────────────
# Every image under assets/ and src/main/resources/whatsnew/ must either be
# explicitly referenced in the declared files OR carry a `justification`
# explaining why it's intentionally unreferenced. The check walks the
# filesystem and fails if:
#   - a PNG/GIF/SVG exists on disk but isn't listed here (orphan asset)
#   - `referenced_by` names a file that doesn't actually mention the path
#   - `referenced_by` is empty and `justification` is missing
asset_inventory:
  # README hero + theme previews
  - path: assets/logo.png
    referenced_by: [README.md]
  - path: assets/Hero.gif
    referenced_by: [README.md]
  - path: assets/preview-mirage-islands.png
    referenced_by: [README.md]
  - path: assets/preview-dark-islands.png
    referenced_by: [README.md]
  - path: assets/preview-light-islands.png
    referenced_by: [README.md]

  # Premium feature grid
  - path: assets/feature-glow.png
    referenced_by: [README.md]
  - path: assets/feature-font.png
    referenced_by: [README.md]
  - path: assets/feature-workspace.png
    referenced_by: [README.md]
  - path: assets/feature-integrations.png
    referenced_by: [README.md]

  # Retired in v2.5.0 — replaced by two focused slide-*-overrides.png crops
  # that show the per-project and per-language override tables directly.
  # Keep the file on disk for history; remove from README references.
  - path: assets/feature-accent.png
    referenced_by: []
    justification: >
      Replaced in v2.5.0 by the two slide-*-overrides.png crops under
      src/main/resources/whatsnew/v2.5.0/. Left on disk as a visual
      reference for the pre-v2.5.0 settings-panel layout.

  # What's New slides — used both in the in-IDE showcase tab and the README
  - path: src/main/resources/whatsnew/v2.5.0/slide-project-overrides.png
    referenced_by: [README.md, src/main/resources/whatsnew/v2.5.0/manifest.json]
  - path: src/main/resources/whatsnew/v2.5.0/slide-language-overrides.png
    referenced_by: [README.md, src/main/resources/whatsnew/v2.5.0/manifest.json]
  - path: src/main/resources/whatsnew/v2.5.0/slide-project-collage.png
    referenced_by: [src/main/resources/whatsnew/v2.5.0/manifest.json]
    justification: >
      Hero-width (2:1) collage — used only in the in-IDE What's New tab.
      README's narrower column layout would downscale it to illegibility.
