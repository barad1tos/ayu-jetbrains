# Single source of truth for Ayu Islands user-facing features.
#
# CI (scripts/verify-docs.py) enforces three invariants:
#
#   1. Every `keyword` in this file appears in README.md AND in the
#      <description> CDATA of src/main/resources/META-INF/plugin.xml
#      (case-insensitive substring match). Prevents "shipped but never
#      mentioned in marketing copy" drift.
#
#   2. Every [Paid]/[Free] bullet in the latest CHANGELOG.md section has
#      a feature with a matching `introduced` version. Prevents
#      "changelog bumped but features.yml forgotten".
#
#   3. Every feature whose `screenshot.sources` has git changes since
#      `screenshot.last_verified_sha` fails with "re-capture OR re-stamp".
#      Plus a SHA-256 byte-hash guard that catches "bumped last_verified_sha
#      but forgot to swap the image file".
#
# When adding a feature: pick a distinctive keyword (short phrase that will
# always appear verbatim in the marketing copy). When the UI changes: either
# re-capture the screenshot and update content_sha256 + last_verified_sha,
# or confirm the UI still matches and bump last_verified_sha only.

schema_version: 1

# ─── Release-sync guard ───────────────────────────────────────────────────
# Tracks the plugin.xml <description> CDATA hash as it was at the time of
# the last successful Marketplace publish. verify-docs.py refuses to pass
# when `gradle.properties.pluginVersion == last_published_version` AND the
# current <description> SHA-256 differs — because that means main has copy
# edits the live Marketplace JAR does NOT reflect (the exact trap that
# caused v2.5.0's Marketplace "About" page to stay on 2.4.x copy after
# PR #131 landed description updates without a version bump).
#
# /release-plugin recomputes last_published_description_sha256 as part of
# the version-bump commit, so the guard resets automatically after a real
# release. Between releases the hash is intentionally frozen to the last
# published state — any copy edit without a version bump fails lint.
release_sync:
  last_published_version: "2.5.1"
  last_published_description_sha256: "8d8996c596cacd275b73d104db05ed775649489c3f6aaae408914dfe598f6e8b"

categories:
