          Decide exactly where the accent appears: scrollbars, links,
          caret line, search highlights, progress bars, bracket matches,
          inlay hints, tag matches. Eight independent switches.

      - id: accent-rotation
        title: "Accent rotation"
        keyword: "Accent rotation"
        introduced: "2.3.2"
