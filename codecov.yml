codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 5%
        informational: true

ignore:
  - "src/main/kotlin/dev/ayuislands/licensing/**"
  - "src/main/kotlin/dev/ayuislands/font/FontPresetApplicator.kt"
  - "src/main/kotlin/dev/ayuislands/settings/FontPresetPanel.kt"
  - "src/main/kotlin/dev/ayuislands/settings/FontPreviewComponent.kt"
  # Pure DialogWrapper UI glue: ColorPicker/ComboBox/FileChooser wiring with no extractable
  # logic. Same files are already excluded from Kover; aligning codecov so the patch report
  # doesn't double-flag what Kover correctly ignores.
  - "src/main/kotlin/dev/ayuislands/settings/mappings/EditAccentColorDialog.kt"
  - "src/main/kotlin/dev/ayuislands/settings/mappings/AddProjectMappingDialog.kt"
  - "src/main/kotlin/dev/ayuislands/settings/mappings/AddLanguageMappingDialog.kt"
  - "src/main/kotlin/dev/ayuislands/settings/mappings/OverridesGroupBuilder.kt"
  - "src/main/kotlin/dev/ayuislands/settings/mappings/AccentSwatchPickerRow.kt"
  - "src/main/kotlin/dev/ayuislands/settings/mappings/RoundedSwatchRenderer.kt"
  # What's New tab: Swing UI builders (hero header, scrollable slide column, card chrome,
  # Graphics2D paint, MouseAdapter handlers) + IDE glue (FileEditor wrapper, coroutine-
  # scheduling launcher). Pure logic (computeScale, computeMaxLogicalImageWidth,
  # computeButtonWidth, isWhatsNewEligible, centerInRow, gaussianBlur, toBufferedImage,
  # readImageScale, readString, half-CTA WARN, orchestrator tryPick/release) lives in
  # companion objects / top-level helpers with dedicated red/green tests. Same classes
  # are excluded from Kover; aligning codecov so the patch report doesn't double-flag
  # what Kover correctly ignores.
  - "src/main/kotlin/dev/ayuislands/whatsnew/WhatsNewPanel.kt"
  - "src/main/kotlin/dev/ayuislands/whatsnew/WhatsNewSlideCard.kt"
  - "src/main/kotlin/dev/ayuislands/whatsnew/WhatsNewImagePanel.kt"
  - "src/main/kotlin/dev/ayuislands/whatsnew/ShowWhatsNewButton.kt"
  - "src/main/kotlin/dev/ayuislands/whatsnew/WhatsNewEditor.kt"
  - "src/main/kotlin/dev/ayuislands/whatsnew/WhatsNewLauncher.kt"

comment:
  layout: "condensed_header, condensed_files, condensed_footer"
  require_changes: true
